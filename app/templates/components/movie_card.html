<div class="movie-card">

    <div class="poster">

        <img
            src="https://image.tmdb.org/t/p/w500{{ movie.poster_path }}"
            alt="{{ movie.title }}"
        >

        <div class="rating">

            ⭐ {{ "%.1f"|format(movie.vote_average) }}

        </div>

    </div>

    <div class="movie-info">

        <h3>{{ movie.title }}</h3>

        <p>

            {{ movie.release_date[:4] }}

        </p>

    </div>

</div>
